name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write  # ✅ 关键修改：允许写入分支（如 gh-pages）
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          personal_token: ${{ secrets.PERSONAL_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages  # ✅ 明确指定，避免歧义

      - name: Download Twikoo (Optional Post-Deploy)
        run: |
          mkdir -p ./themes/DoIt/assets/lib/twikoo/
          curl -L https://cdn.jsdelivr.net/npm/twikoo@1.6.20/dist/twikoo.all.min.js \
            -o ./themes/DoIt/assets/lib/twikoo/twikoo.all.min.js