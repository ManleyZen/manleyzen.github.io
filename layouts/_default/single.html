{{ define "main" }}
  <article class="post">
    <header class="post-header">
      <h1>{{ .Title }}</h1>
      {{ with .Params.date }}<time datetime="{{ .Format "2006-01-02T15:04:05Z07:00" }}">{{ .Format "2006年01月02日" }}</time>{{ end }}
    </header>
    <div class="post-content">
      {{ .Content }}
    </div>
  </article>

  <!-- 前一篇 / 后一篇导航 -->
  <nav class="post-nav">
    {{ if .PrevInSection }}
      <div class="prev-post">
        <h4>上一篇</h4>
        <a href="{{ .PrevInSection.RelPermalink }}">{{ .PrevInSection.Title }}</a>
      </div>
    {{ end }}
    {{ if .NextInSection }}
      <div class="next-post">
        <h4>下一篇</h4>
        <a href="{{ .NextInSection.RelPermalink }}">{{ .NextInSection.Title }}</a>
      </div>
    {{ end }}
  </nav>

  {{ partial "comments.html" . }} <!-- 如果你启用了评论系统 -->
{{ end }}
